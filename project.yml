name: ElevenFingers
options:
  bundleIdPrefix: com.elevenfingers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  ElevenFingersApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ElevenFingersApp
      - path: ElevenFingersCore
    resources: []
    dependencies:
      - target: ElevenFingersKeyboard
    info:
      path: ElevenFingersApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: ElevenFingers
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: >
          ElevenFingers records your voice and combines it with your handwriting
          to produce final text. Audio is sent to your configured backend and not
          retained on-device after submission.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - elevenfingers
            CFBundleURLName: com.elevenfingers.app
    entitlements:
      path: ElevenFingersApp/ElevenFingersApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.elevenfingers.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elevenfingers.app
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportsDocumentBrowser: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

  ElevenFingersKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ElevenFingersKeyboard
      - path: ElevenFingersCore
    info:
      path: ElevenFingersKeyboard/Resources/Info.plist
      properties:
        CFBundleDisplayName: ElevenFingers
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            RequestsOpenAccess: true
            PrimaryLanguage: en-US
            PrefersRightToLeft: false
            IsASCIICapable: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: ElevenFingersKeyboard/ElevenFingersKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.elevenfingers.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elevenfingers.app.keyboard
